# Archivo de orquestacion para produccion en VPS.
# Levanta el backend Java y Nginx como proxy inverso (HTTP-only).
# La base de datos es gestionada (TiDB Cloud); no se levanta MySQL aqui.
# El frontend se sirve desde Vercel, por lo que no se incluye aqui.
# Las credenciales y secretos se leen desde /opt/digital-cow/.env (ver .env.prod.example).

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: digitalcow-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Base de datos gestionada (TiDB Cloud): endpoint y credenciales desde .env.
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-4000}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_PARAMS: "${MYSQL_PARAMS:-sslMode=VERIFY_IDENTITY&serverTimezone=UTC&characterEncoding=utf8}"
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-resend}
      MAIL_FROM: ${MAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75 -Djava.security.egd=file:/dev/./urandom"
    networks:
      - digitalcow-net
    # Solo Nginx expone trafico al exterior. El backend solo escucha en la red interna.

  nginx:
    image: nginx:1.27-alpine
    container_name: digitalcow-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - digitalcow-net

networks:
  digitalcow-net:
    driver: bridge
