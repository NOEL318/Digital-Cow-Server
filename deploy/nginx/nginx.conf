# Nginx para Digital Cow en VPS (HTTP-only por IP).
# Hace reverse proxy al backend Spring Boot escuchando en backend:8080
# dentro de la red interna de docker-compose.
# Para HTTPS habria que sumar certbot + un bloque server en :443 con un dominio real.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain text/xml application/xml;

    # Tamano maximo del body para subidas de imagenes (Cloudinary va aparte, pero por si acaso).
    client_max_body_size 20m;

    # Logs en JSON a stdout/stderr para que docker logs los recoja.
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent"'
        '}';
    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    upstream backend_upstream {
        server backend:8080;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        # Cabeceras de seguridad. No incluimos HSTS porque servimos HTTP plano.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "interest-cohort=()" always;

        # Endpoint de salud para monitoreo externo (sin auth).
        location = /actuator/health {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API publica.
        location /api/ {
            proxy_pass http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Swagger UI para desarrolladores; comentar en produccion publica si no se desea.
        location /swagger-ui {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /v3/api-docs {
            proxy_pass http://backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cualquier otra ruta devuelve un texto neutro para no exponer endpoints administrativos.
        location / {
            return 200 "Digital Cow API\n";
            default_type text/plain;
        }
    }
}
