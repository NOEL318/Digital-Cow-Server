spring:
  application:
    name: digitalcow
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:digitalcow}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${MYSQL_USER:digitalcow}
    password: ${MYSQL_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  data:
    web:
      pageable:
        # Limite global de tamano de pagina para que un cliente no pueda pedir
        # paginas de millones de filas y agotar la memoria del proceso.
        max-page-size: 100
        default-page-size: 20
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  mail:
    # Configuracion SMTP opcional. Solo se usa si digitalcow.mail.provider=smtp.
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080
  forward-headers-strategy: framework
  # Limite del cuerpo de peticion para prevenir denegacion de servicio por payload grande.
  tomcat:
    max-http-form-post-size: 12MB
    max-swallow-size: 12MB

management:
  endpoints:
    web:
      exposure:
        # Solo se expone health publicamente. Metrics e info quedan disponibles solo para usuarios autenticados.
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    # El health de mail intenta abrir conexion SMTP y falla porque
    # usamos Resend via REST (no SMTP). Lo desactivamos para que
    # /actuator/health responda UP cuando el resto esta sano.
    mail:
      enabled: false

digitalcow:
  security:
    jwt:
      secret: ${JWT_SECRET}
      # TTL muy largo para que el usuario rara vez tenga que volver a iniciar sesion.
      # Ranchero usa la app durante toda la jornada sin querer reautenticarse.
      access-token-ttl-minutes: 720
      refresh-token-ttl-days: 365
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  mail:
    # Proveedor de envio: dev, smtp, resend. Default: dev (loguea en consola).
    provider: ${MAIL_PROVIDER:dev}
    # Remitente. Formato "Nombre <email@dominio>".
    from: ${MAIL_FROM:Digital Cow <no-reply@digitalcow.local>}
    resend:
      api-key: ${RESEND_API_KEY:}
  superadmin:
    email: ${SUPERADMIN_EMAIL:admin@digitalcow.local}

resilience4j:
  circuitbreaker:
    instances:
      cloudinary:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
      resend:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
  retry:
    instances:
      cloudinary:
        maxAttempts: 3
        waitDuration: 200ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
      resend:
        maxAttempts: 3
        waitDuration: 300ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2

springdoc:
  swagger-ui:
    path: /swagger-ui.html
