services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # La base de datos es gestionada (TiDB Cloud). Endpoint y credenciales vienen del .env.
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT:-4000}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # Parametros JDBC. Para TiDB se requiere TLS: MYSQL_PARAMS=sslMode=VERIFY_IDENTITY&... en .env.
      MYSQL_PARAMS: "${MYSQL_PARAMS:-sslMode=VERIFY_IDENTITY&serverTimezone=UTC&characterEncoding=utf8}"
      JWT_SECRET: ${JWT_SECRET}
      # CORS debe incluir el dominio donde Vercel sirve el frontend ademas del dev local.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-dev}
      MAIL_FROM: ${MAIL_FROM:-Digital Cow <no-reply@digitalcow.local>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
    ports:
      - "8080:8080"

# El frontend ya NO se sirve por Docker. Se despliega en Vercel:
#   - Root del proyecto en Vercel: /frontend
#   - Build command: npm run build
#   - Output directory: dist
#   - Variables de entorno: VITE_API_URL apuntando al backend publico
# La base de datos tampoco se levanta por Docker: es TiDB Cloud (gestionada).
# Ver README.md para el procedimiento completo.
