services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      # Volumen nombrado. Sobrevive a "docker compose down".
      - digitalcow_mysql_data:/var/lib/mysql
      # Carpeta para backups manuales/cron en host.
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3306:3306"

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - mysql

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # CORS debe incluir el dominio donde Vercel sirve el frontend
      # (ej: https://digital-cow.vercel.app) ademas del dev local.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      MAIL_PROVIDER: ${MAIL_PROVIDER:-dev}
      MAIL_FROM: ${MAIL_FROM:-Digital Cow <no-reply@digitalcow.local>}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

# El frontend ya NO se sirve por Docker. Se despliega en Vercel:
#   - Root del proyecto en Vercel: /frontend
#   - Build command: npm run build
#   - Output directory: dist
#   - Variables de entorno: VITE_API_URL apuntando al backend publico
# Ver README.md para el procedimiento completo.

volumes:
  digitalcow_mysql_data:
    name: digitalcow_mysql_data
    external: false
    labels:
      app: "digital-cow"
      purpose: "mysql-data-persistence"
